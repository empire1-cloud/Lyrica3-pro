server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # security headers (mirror vercel.json)
  add_header X-Content-Type-Options   "nosniff"        always;
  add_header X-Frame-Options          "DENY"           always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "microphone=(self), camera=()"    always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # PWA service worker must NEVER be cached
  location = /service-worker.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
  }

  # hashed static assets — cache forever
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # manifest + icons
  location ~ \.(webmanifest|json|png|ico|svg|webp)$ {
    expires 7d;
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # gzip
  gzip on;
  gzip_types application/javascript application/json text/css text/plain application/xml image/svg+xml;
  gzip_min_length 1024;
}
