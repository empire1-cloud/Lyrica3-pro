# ============================================================
# Lyrica 3 Pro · Empire 1 — Railway deploy spec (Backend)
# FastAPI + Demucs v4  ·  root service
# ============================================================
# Set Root Directory to "." for this service in the Railway dashboard.
# Required env vars (set in Railway → Variables):
#   MONGO_URL             MongoDB Atlas SRV connection string
#   JWT_SECRET            Random 32-char secret (generate once, never rotate mid-session)
#   EMERGENT_LLM_KEY      From the Emergent dashboard
#   STRIPE_SECRET_KEY     Stripe secret key (if payments are enabled)
#   REPLICATE_API_KEY     Replicate API key (optional — for external model calls)
# ============================================================

[build]
builder      = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
dockerContext  = "."

[deploy]
# Railway injects $PORT automatically; the CMD in the Dockerfile already
# reads it via `${PORT}`.
healthcheckPath    = "/health"
healthcheckTimeout = 300
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.variables]
DB_NAME        = "lyrica3_prod"
# Comma-separated — update to your Vercel / custom domain(s)
CORS_ORIGINS   = "https://lyrica3pro.com,https://www.lyrica3pro.com"
WORKERS        = "2"
DEMUCS_MODEL   = "htdemucs"
DEMUCS_ENABLED = "false"
VOICE_TTL_MIN  = "240"
UPLOAD_TTL_MIN = "1440"
